<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Periodic Table</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="main-container">
      <h1>Periodic Table Quiz</h1>
      <h2>Test your periodic table knowledge</h2>
      <h3>Click on the button to get a symbol</h3>
      <section>
        <button id="button">Get a random element symbol</button>
        <p id="element-symbol" class="symbol-styling animated move-down"></p>
        <button id="answer-button" class="animated move-up">Reveal element</button>
        <p id="answer" class="name-and-reason-styling animated move-down"></p>
        <button id="reason-for-naming" class="animated move-up">
          Why does it have this naming?
        </button>
        <p id="symbol-origin" class="name-and-reason-styling animated move-down"></p>
      </section>
    </div>
    <script type="module" src="./dist/index.js"></script>
  </body>
</html>
