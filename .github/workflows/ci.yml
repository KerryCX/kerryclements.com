name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      # 1. Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3
      # 2. Set up Node.js
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci
      # 5. Run Jest tests
      - name: Run tests
        run: npm test
